# =============================================================================
# Nginx config for Hotel Udhayam International
# Domain: hoteludhayam.international
#
# Setup:
#   1. Copy this file to /etc/nginx/sites-available/hoteludhayam
#   2. ln -s /etc/nginx/sites-available/hoteludhayam /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. Run certbot for SSL (see deploy.sh)
# =============================================================================

# --- API Server (api.hoteludhayam.international) ---
server {
    listen 80;
    server_name api.hoteludhayam.international;

    # Certbot will add SSL config here after running
    # certbot --nginx -d api.hoteludhayam.international

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Max upload size
        client_max_body_size 10M;
    }
}

# --- Public Website (hoteludhayam.international) ---
server {
    listen 80;
    server_name hoteludhayam.international www.hoteludhayam.international;

    root /var/www/hotel/website/dist;
    index index.html;

    # Certbot will add SSL config here
    # certbot --nginx -d hoteludhayam.international -d www.hoteludhayam.international

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}

# --- PMS Admin App (app.hoteludhayam.international) ---
server {
    listen 80;
    server_name app.hoteludhayam.international;

    root /var/www/hotel/client/dist;
    index index.html;

    # Certbot will add SSL config here
    # certbot --nginx -d app.hoteludhayam.international

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
