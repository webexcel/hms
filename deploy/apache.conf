# =============================================================================
# Apache config for Hotel Udhayam International
# Domain: hoteludhayam.international
#
# Setup:
#   1. Enable required modules:
#      sudo a2enmod proxy proxy_http rewrite ssl headers
#   2. Copy this file to /etc/apache2/sites-available/hoteludhayam.conf
#   3. sudo a2ensite hoteludhayam
#   4. sudo systemctl reload apache2
#   5. SSL: sudo certbot --apache -d hoteludhayam.international -d www.hoteludhayam.international -d app.hoteludhayam.international -d api.hoteludhayam.international
# =============================================================================

# --- API Server (api.hoteludhayam.international) ---
<VirtualHost *:80>
    ServerName api.hoteludhayam.international

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3006/
    ProxyPassReverse / http://127.0.0.1:3006/

    # Max upload size
    LimitRequestBody 10485760

    # CORS headers handled by Express, not Apache
</VirtualHost>

# --- Public Website (hoteludhayam.international) ---
<VirtualHost *:80>
    ServerName hoteludhayam.international
    ServerAlias www.hoteludhayam.international

    DocumentRoot /var/www/hms/website/dist

    <Directory /var/www/hms/website/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback — all routes go to index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Cache static assets
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </FilesMatch>

    # Gzip
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml
    </IfModule>
</VirtualHost>

# --- PMS Admin App (app.hoteludhayam.international) ---
<VirtualHost *:80>
    ServerName app.hoteludhayam.international

    DocumentRoot /var/www/hms/client/dist

    <Directory /var/www/hms/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Cache static assets
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </FilesMatch>

    # Gzip
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml
    </IfModule>
</VirtualHost>
